name: Deploy Web

on:
  push:
    branches: [main]

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            if [ ! -d "bottom-line-client" ]; then
              git clone https://github.com/velddev/bottom-line-client.git
            fi
            cd bottom-line-client
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy.sh
            ./deploy.sh
