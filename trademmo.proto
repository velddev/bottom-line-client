service BuildingService {
  // Construct a new building on the given tile in the city.
  rpc Construct              (ConstructRequest)              returns (ConstructResponse) {
  }
  // Configure a building's recipe and worker count.
  rpc Configure              (ConfigureRequest)              returns (ConfigureResponse) {
  }
  // Get full status of a single building.
  rpc GetStatus              (GetBuildingRequest)            returns (BuildingInfo) {
  }
  // List all buildings owned by the authenticated player.
  rpc ListBuildings          (ListBuildingsRequest)          returns (ListBuildingsResponse) {
  }
  // List all production recipes, optionally filtered by building type.
  rpc ListRecipes            (ListRecipesRequest)            returns (ListRecipesResponse) {
  }
  // Get all active supply links for a building (what it buys from and who).
  rpc GetSupplyLinks         (GetSupplyLinksRequest)         returns (GetSupplyLinksResponse) {
  }
  // Add a supply link: building will auto-buy resource_type from supplier_building_id each tick.
  rpc AddSupplyLink          (AddSupplyLinkRequest)          returns (AddSupplyLinkResponse) {
  }
  // Remove a supply link by ID.
  rpc RemoveSupplyLink       (RemoveSupplyLinkRequest)       returns (RemoveSupplyLinkResponse) {
  }
  // List buildings in the city that sell a given resource type (for supply link creation).
  // Stores are excluded — they sell to citizens only.
  rpc ListPotentialSuppliers (ListPotentialSuppliersRequest) returns (ListPotentialSuppliersResponse) {
  }
  // Get auto-sell price configs for all resource types a building produces.
  rpc GetAutoSellConfigs     (GetAutoSellConfigsRequest)     returns (GetAutoSellConfigsResponse) {
  }
  // Set the auto-sell price and enabled state for a resource type on a building.
  rpc SetAutoSellConfig      (SetAutoSellConfigRequest)      returns (SetAutoSellConfigResponse) {
  }
  // Get historical per-tick sales data for a store building.
  rpc GetBuildingSales       (GetBuildingSalesRequest)       returns (GetBuildingSalesResponse) {
  }
}

