// ─────────────────────────────────────────────────────────────────────────
// events.proto
// ─────────────────────────────────────────────────────────────────────────
// ── Subscribe to game events ──────────────────────────────────────────────────

service GameEventService {
  // Open a streaming subscription to all game events in the player's city.
  rpc Subscribe (SubscribeRequest) returns (stream GameEvent);
}

message SubscribeRequest {
  string city_id = 1;
}

// ── Envelope ──────────────────────────────────────────────────────────────────

message GameEvent {
  string event_id   = 1;
  int64  tick       = 2;
  Timestamp occurred_at = 3;

  oneof payload {
    TickCompletedEvent         tick_completed          = 10;
    ResourceProducedEvent      resource_produced       = 11;
    TradeCompletedEvent        trade_completed         = 12;
    MarketPriceChangedEvent    market_price_changed    = 13;
    BuildingConstructedEvent   building_constructed    = 14;
    ElectionAnnouncedEvent     election_announced      = 15;
    ElectionConcludedEvent     election_concluded      = 16;
    TradeAgreementChangedEvent agreement_changed       = 17;
    BrandValueChangedEvent     brand_value_changed     = 18;
    TaxesCollectedEvent        taxes_collected         = 19;
    TileChangedEvent           tile_changed            = 20;
    ChatMessageSentEvent       chat_message            = 21;
    BuildingConstructionStartedEvent building_construction_started = 22;
    BuildingStatusChangedEvent building_status_changed = 23;
  }
}

// ── Event payloads ────────────────────────────────────────────────────────────

message TickCompletedEvent {
  string city_id = 1;
}

message ResourceProducedEvent {
  string       building_id   = 1;
  string       player_id     = 2;
  ResourceType resource_type = 3;
  double       quantity      = 4;
  float        quality       = 5;
}

message TradeCompletedEvent {
  string       buyer_building_id  = 1;
  string       seller_building_id = 2;
  ResourceType resource_type      = 3;
  double       quantity           = 4;
  int64        total_price        = 5;
}

message MarketPriceChangedEvent {
  string       city_id          = 1;
  ResourceType resource_type    = 2;
  int64        old_median_price = 3;
  int64        new_median_price = 4;
}

message BuildingConstructedEvent {
  string       building_id   = 1;
  string       player_id     = 2;
  BuildingType building_type = 3;
  string       building_name = 4;
  string       city_id       = 5;
}

message BuildingConstructionStartedEvent {
  string       city_id                       = 1;
  string       building_id                   = 2;
  string       player_id                     = 3;
  string       building_name                 = 4;
  BuildingType building_type                 = 5;
  int32        construction_ticks_remaining  = 6;
}

message BuildingStatusChangedEvent {
  string         city_id       = 1;
  string         building_id   = 2;
  string         player_id     = 3;
  string         building_name = 4;
  BuildingType   building_type = 5;
  BuildingStatus old_status    = 6;
  BuildingStatus new_status    = 7;
}

message ElectionAnnouncedEvent {
  string election_id       = 1;
  string city_id           = 2;
  int64  voting_start_tick = 3;
}

message ElectionConcludedEvent {
  string election_id       = 1;
  string city_id           = 2;
  string winner_player_id  = 3; // empty = AI retains control
}

message TradeAgreementChangedEvent {
  string          agreement_id      = 1;
  string          creator_player_id = 2;
  string          buyer_player_id   = 3;
  AgreementStatus new_status        = 4;
}

message BrandValueChangedEvent {
  string brand_id          = 1;
  string player_id         = 2;
  string resource_category = 3;
  float  old_weight        = 4;
  float  new_weight        = 5;
}

message TaxesCollectedEvent {
  string city_id         = 1;
  int64  total_collected = 2;
}

message TileChangedEvent {
  string         city_id         = 1;
  string         tile_id         = 2;
  int32          grid_x          = 3;
  int32          grid_y          = 4;
  string         owner_player_id = 5;
  string         owner_name      = 6;
  bool           is_for_sale     = 7;
  int64          purchase_price  = 8;
  string         building_id     = 9;
  string         building_name   = 10;
  BuildingType   building_type   = 11;
  BuildingStatus building_status = 12;
}

// Emitted when a player sends a public or DM chat message in the city.
message ChatMessageSentEvent {
  string message_id       = 1;
  string from_player_id   = 2;
  string from_player_name = 3;
  string to_player_id     = 4; // empty = public city chat
  string to_player_name   = 5;
  string content          = 6;
  int64  sent_at_tick     = 7;
}


// ─────────────────────────────────────────────────────────────────────────
// market.proto
// ─────────────────────────────────────────────────────────────────────────
service MarketService {
  rpc ListOfferings         (ListOfferingsRequest)         returns (ListOfferingsResponse) {
  }
  rpc CancelOffering        (CancelOfferingRequest)        returns (CancelOfferingResponse) {
  }
  rpc Purchase              (PurchaseRequest)              returns (PurchaseResponse) {
  }
  rpc GetMarketShare        (GetMarketShareRequest)        returns (GetMarketShareResponse) {
  }
  rpc GetDemandUtilization  (GetDemandUtilizationRequest)  returns (GetDemandUtilizationResponse) {
  }
}

enum OfferingVisibility {
  OFFERING_VISIBILITY_UNSPECIFIED    = 0;
  OFFERING_VISIBILITY_PUBLIC         = 1; // visible to all buyers
  OFFERING_VISIBILITY_PRIVATE        = 2; // not listed on open market
  OFFERING_VISIBILITY_AGREEMENT_ONLY = 3; // only available via trade agreement
}

message ListOfferingsRequest {
  string       city_id       = 1;
  ResourceType resource_type = 2; // optional filter; 0 = no filter
}

message Offering {
  string             offering_id    = 1;
  string             seller_name    = 2;
  ResourceType       resource_type  = 3;
  int64              price_per_unit = 4;
  double             quantity       = 5;
  float              quality        = 6;
  string             brand_name     = 7; // empty = white-label
  OfferingVisibility visibility     = 8;
}

message ListOfferingsResponse {
  repeated Offering offerings = 1;
}

message CancelOfferingRequest {
  string offering_id = 1;
}

message CancelOfferingResponse {
  bool success = 1;
}

message PurchaseRequest {
  string buyer_building_id = 1;
  string offering_id       = 2;
  double quantity          = 3;
}

message PurchaseResponse {
  int64 total_paid = 1;
  float quality    = 2;
}

message GetMarketShareRequest {
  string       city_id       = 1;
  ResourceType resource_type = 2; // optional — 0 returns all resource types
  int32        history_ticks = 3; // how many ticks of history (default 20)
}

message MarketShareDataPoint {
  string       player_id     = 1;
  string       player_name   = 2;
  ResourceType resource_type = 3;
  double       sale_volume   = 4;
  float        share_percent = 5;
  int64        tick          = 6;
}

message GetMarketShareResponse {
  repeated MarketShareDataPoint data = 1;
}

// ── Demand Utilization ────────────────────────────────────────────────────────

message GetDemandUtilizationRequest {
  string city_id       = 1;
  int32  history_ticks = 2; // default 20
}

/// How much of total citizen demand was fulfilled for a given resource and tick.
message DemandUtilizationPoint {
  int64        tick             = 1;
  ResourceType resource_type   = 2;
  double       total_demand    = 3;   // total units citizens wanted to buy
  double       fulfilled_demand = 4;  // units actually sold
  float        utilization_pct = 5;   // fulfilled / total × 100
}

message GetDemandUtilizationResponse {
  repeated DemandUtilizationPoint data = 1;
}


