events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # api.ventured.gg — gRPC (HTTP/2, /) and JSON transcoding REST (/v1/)
    server {
        listen 443 ssl http2;
        server_name api.ventured.gg;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # SSE stream needs special buffering settings
        location /v1/events/stream {
            proxy_pass http://trademmo.server:8081;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # All other /v1/* routes → JSON transcoding (HTTP/1.1)
        location /v1/ {
            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Content-Type, x-api-key, Authorization' always;
                add_header Access-Control-Max-Age 86400 always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Headers 'Content-Type, x-api-key, Authorization' always;

            proxy_pass http://trademmo.server:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # All other routes → gRPC (HTTP/2)
        location / {
            grpc_pass grpc://trademmo.server:8080;

            grpc_read_timeout  300s;
            grpc_send_timeout  300s;
            grpc_connect_timeout 5s;

            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
        }
    }
}
