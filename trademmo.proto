// ─────────────────────────────────────────────────────────────────────────
// chat.proto
// ─────────────────────────────────────────────────────────────────────────
// ── Chat service ──────────────────────────────────────────────────────────────
// Public city chat and direct messages between players.
// All messages are scoped to the sender's city.

service ChatService {
  // Send a public city message or a direct message to another player.
  rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);

  // Retrieve recent messages.
  // If to_player_id is empty, returns the public city chat (last N messages).
  // If to_player_id is set, returns the DM thread between the caller and that player.
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse);

  // List all players the caller has had a DM conversation with.
  rpc ListDmConversations (ListDmConversationsRequest) returns (ListDmConversationsResponse);
}

// ── Request / response messages ───────────────────────────────────────────────

message SendMessageRequest {
  string content      = 1; // message body (max 500 chars)
  string to_player_id = 2; // empty = public city chat; set = DM to this player
}

message SendMessageResponse {
  bool   success = 1;
  string message = 2;
}

message GetMessagesRequest {
  string city_id      = 1; // city to fetch messages for
  string to_player_id = 2; // empty = public chat; set = DM thread
  int32  limit        = 3; // max number of messages to return (default 50, max 200)
  string before_id    = 4; // pagination cursor: return messages older than this id
}

message GetMessagesResponse {
  repeated ChatMessageInfo messages = 1;
}

message ListDmConversationsRequest {}

message ListDmConversationsResponse {
  repeated DmConversationInfo conversations = 1;
}

// ── Data messages ─────────────────────────────────────────────────────────────

message ChatMessageInfo {
  string    message_id      = 1;
  string    city_id         = 2;
  string    from_player_id  = 3;
  string    from_player_name= 4;
  string    to_player_id    = 5; // empty = public
  string    to_player_name  = 6; // empty = public
  string    content         = 7;
  int64     sent_at_tick    = 8;
  Timestamp created_at = 9;
}

message DmConversationInfo {
  string partner_player_id   = 1;
  string partner_player_name = 2;
  string last_message        = 3;
  int64  last_sent_at_tick   = 4;
}


