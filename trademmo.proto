// ─────────────────────────────────────────────────────────────────────────
// events.proto
// ─────────────────────────────────────────────────────────────────────────
// ── Subscribe to game events ──────────────────────────────────────────────────

service GameEventService {
  // Open a streaming subscription to all game events in the player's city.
  rpc Subscribe (SubscribeRequest) returns (stream GameEvent);
}

message SubscribeRequest {
  string city_id = 1;
}

// ── Envelope ──────────────────────────────────────────────────────────────────

message GameEvent {
  string event_id   = 1;
  int64  tick       = 2;
  Timestamp occurred_at = 3;

  oneof payload {
    TickCompletedEvent         tick_completed          = 10;
    ResourceProducedEvent      resource_produced       = 11;
    TradeCompletedEvent        trade_completed         = 12;
    MarketPriceChangedEvent    market_price_changed    = 13;
    BuildingConstructedEvent   building_constructed    = 14;
    ElectionAnnouncedEvent     election_announced      = 15;
    ElectionConcludedEvent     election_concluded      = 16;
    TradeAgreementChangedEvent agreement_changed       = 17;
    BrandValueChangedEvent     brand_value_changed     = 18;
    TaxesCollectedEvent        taxes_collected         = 19;
    TileChangedEvent           tile_changed            = 20;
  }
}

// ── Event payloads ────────────────────────────────────────────────────────────

message TickCompletedEvent {
  string city_id = 1;
}

message ResourceProducedEvent {
  string       building_id   = 1;
  string       player_id     = 2;
  ResourceType resource_type = 3;
  double       quantity      = 4;
  float        quality       = 5;
}

message TradeCompletedEvent {
  string       buyer_building_id  = 1;
  string       seller_building_id = 2;
  ResourceType resource_type      = 3;
  double       quantity           = 4;
  int64        total_price        = 5;
}

message MarketPriceChangedEvent {
  string       city_id          = 1;
  ResourceType resource_type    = 2;
  int64        old_median_price = 3;
  int64        new_median_price = 4;
}

message BuildingConstructedEvent {
  string       building_id   = 1;
  string       player_id     = 2;
  BuildingType building_type = 3;
}

message ElectionAnnouncedEvent {
  string election_id       = 1;
  string city_id           = 2;
  int64  voting_start_tick = 3;
}

message ElectionConcludedEvent {
  string election_id       = 1;
  string city_id           = 2;
  string winner_player_id  = 3; // empty = AI retains control
}

message TradeAgreementChangedEvent {
  string          agreement_id      = 1;
  string          creator_player_id = 2;
  string          buyer_player_id   = 3;
  AgreementStatus new_status        = 4;
}

message BrandValueChangedEvent {
  string brand_id          = 1;
  string player_id         = 2;
  string resource_category = 3;
  float  old_weight        = 4;
  float  new_weight        = 5;
}

message TaxesCollectedEvent {
  string city_id         = 1;
  int64  total_collected = 2;
}

message TileChangedEvent {
  string         city_id         = 1;
  string         tile_id         = 2;
  int32          grid_x          = 3;
  int32          grid_y          = 4;
  string         owner_player_id = 5;
  string         owner_name      = 6;
  bool           is_for_sale     = 7;
  int64          purchase_price  = 8;
  string         building_id     = 9;
  string         building_name   = 10;
  BuildingType   building_type   = 11;
  BuildingStatus building_status = 12;
}


