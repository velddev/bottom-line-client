// ─────────────────────────────────────────────────────────────────────────
// market.proto
// ─────────────────────────────────────────────────────────────────────────
service MarketService {
  rpc ListOfferings         (ListOfferingsRequest)         returns (ListOfferingsResponse) {
    option (google.api.http) = { get: "/v1/cities/{city_id}/offerings" };
  }
  rpc CancelOffering        (CancelOfferingRequest)        returns (CancelOfferingResponse) {
    option (google.api.http) = { delete: "/v1/offerings/{offering_id}" };
  }
  rpc Purchase              (PurchaseRequest)              returns (PurchaseResponse) {
    option (google.api.http) = { post: "/v1/offerings/{offering_id}/purchase" body: "*" };
  }
  rpc GetMarketShare        (GetMarketShareRequest)        returns (GetMarketShareResponse) {
    option (google.api.http) = { get: "/v1/cities/{city_id}/market-share" };
  }
  rpc GetDemandUtilization  (GetDemandUtilizationRequest)  returns (GetDemandUtilizationResponse) {
    option (google.api.http) = { get: "/v1/cities/{city_id}/demand-utilization" };
  }
}

enum OfferingVisibility {
  OFFERING_VISIBILITY_UNSPECIFIED    = 0;
  OFFERING_VISIBILITY_PUBLIC         = 1; // visible to all buyers
  OFFERING_VISIBILITY_PRIVATE        = 2; // not listed on open market
  OFFERING_VISIBILITY_AGREEMENT_ONLY = 3; // only available via trade agreement
}

message ListOfferingsRequest {
  string       city_id       = 1;
  ResourceType resource_type = 2; // optional filter; 0 = no filter
}

message Offering {
  string             offering_id    = 1;
  string             seller_name    = 2;
  ResourceType       resource_type  = 3;
  int64              price_per_unit = 4;
  double             quantity       = 5;
  float              quality        = 6;
  string             brand_name     = 7; // empty = white-label
  OfferingVisibility visibility     = 8;
}

message ListOfferingsResponse {
  repeated Offering offerings = 1;
}

message CancelOfferingRequest {
  string offering_id = 1;
}

message CancelOfferingResponse {
  bool success = 1;
}

message PurchaseRequest {
  string buyer_building_id = 1;
  string offering_id       = 2;
  double quantity          = 3;
}

message PurchaseResponse {
  int64 total_paid = 1;
  float quality    = 2;
}

message GetMarketShareRequest {
  string       city_id       = 1;
  ResourceType resource_type = 2; // optional — 0 returns all resource types
  int32        history_ticks = 3; // how many ticks of history (default 20)
}

message MarketShareDataPoint {
  string       player_id     = 1;
  string       player_name   = 2;
  ResourceType resource_type = 3;
  double       sale_volume   = 4;
  float        share_percent = 5;
  int64        tick          = 6;
}

message GetMarketShareResponse {
  repeated MarketShareDataPoint data = 1;
}

// ── Demand Utilization ────────────────────────────────────────────────────────

message GetDemandUtilizationRequest {
  string city_id       = 1;
  int32  history_ticks = 2; // default 20
}

/// How much of total citizen demand was fulfilled for a given resource and tick.
message DemandUtilizationPoint {
  int64        tick             = 1;
  ResourceType resource_type   = 2;
  double       total_demand    = 3;   // total units citizens wanted to buy
  double       fulfilled_demand = 4;  // units actually sold
  float        utilization_pct = 5;   // fulfilled / total × 100
}

message GetDemandUtilizationResponse {
  repeated DemandUtilizationPoint data = 1;
}


// ─────────────────────────────────────────────────────────────────────────
// marketing.proto
// ─────────────────────────────────────────────────────────────────────────
service MarketingService {
  rpc CreateBrand    (CreateBrandRequest)    returns (CreateBrandResponse) {
  }
  rpc CreateCampaign (CreateCampaignRequest) returns (CreateCampaignResponse) {
  }
  rpc PauseCampaign  (PauseCampaignRequest)  returns (PauseCampaignResponse) {
    option (google.api.http) = { put: "/v1/campaigns/{campaign_id}/pause" body: "*" };
  }
  rpc GetBrandValue  (GetBrandValueRequest)  returns (BrandValueResponse) {
    option (google.api.http) = { get: "/v1/brands/{brand_id}" };
  }
  rpc ListBrands     (ListBrandsRequest)     returns (ListBrandsResponse) {
  }
}

message CreateBrandRequest {
  string       name          = 1;
  ResourceType resource_type = 2;
}

message CreateBrandResponse {
  string brand_id = 1;
}

message CreateCampaignRequest {
  string brand_id          = 1;
  string campaign_name     = 2;
  int64  budget_per_tick   = 3;
  int32  workers_allocated = 4;
}

message CreateCampaignResponse {
  string campaign_id = 1;
}

message PauseCampaignRequest {
  string campaign_id = 1;
  bool   pause       = 2;
}

message PauseCampaignResponse {
  bool success = 1;
}

message GetBrandValueRequest {
  string brand_id = 1;
}

message BrandValueResponse {
  string       brand_id          = 1;
  string       brand_name        = 2;
  ResourceType resource_category = 3;
  float        brand_weight      = 4;
  float        market_share      = 5; // 0–1 fraction of total brand weight in category
}

message BrandSummary {
  string       brand_id    = 1;
  string       name        = 2;
  ResourceType resource    = 3;
  float        brand_weight = 4;
  float        market_share = 5;
}

message ListBrandsRequest {}

message ListBrandsResponse {
  repeated BrandSummary brands = 1;
}


// ─────────────────────────────────────────────────────────────────────────
// player.proto
// ─────────────────────────────────────────────────────────────────────────
service PlayerService {
  rpc Register            (RegisterRequest)            returns (RegisterResponse) {
  }
  rpc GetProfile          (GetProfileRequest)          returns (PlayerProfile) {
  }
  rpc GetInventory        (GetInventoryRequest)        returns (InventoryResponse) {
  }
  rpc GetCompanyHistory   (GetCompanyHistoryRequest)   returns (GetCompanyHistoryResponse) {
  }
  rpc FindPlayerByHandle  (FindPlayerByHandleRequest)  returns (FindPlayerByHandleResponse) {
    option (google.api.http) = { get: "/v1/players/handle/{handle}" };
  }
}

message RegisterRequest {
  string username = 1;
}

message RegisterResponse {
  string player_id = 1;
  string api_key   = 2; // raw key — shown once, store it!
}

message GetProfileRequest {
  // player_id resolved from API key by interceptor
}

message PlayerProfile {
  string player_id         = 1;
  string username          = 2;
  int64  balance           = 3;
  float  public_perception = 4;
  string city_id           = 5;
  int64  joined_at_tick    = 6;
  bool   is_system         = 7; // true for government and other non-playable system players
}

message GetInventoryRequest {
  string building_id = 1; // optional; omit to get all buildings
}

message InventoryItem {
  string       building_id   = 1;
  string       building_name = 2;
  ResourceType resource_type = 3;
  double       quantity      = 4;
  float        quality       = 5;
  string       brand_id      = 6; // empty = unbranded
}

message InventoryResponse {
  repeated InventoryItem items = 1;
}

// ── Company History ──────────────────────────────────────────────────────────

message GetCompanyHistoryRequest {
  // Number of ticks of history to return; defaults to 60 (last hour).
  int32 limit = 1;
}

/// One tick's financial snapshot for the calling player.
message CompanyTickSnapshot {
  int64 tick                          = 1;

  // Revenue
  int64 store_revenue_cents           = 2;   // net received from citizen store sales
  int64 supply_line_sales_cents       = 3;   // received when others bought from your buildings
  int64 rental_income_cents           = 17;  // gross rental income from residential buildings

  // Expenses
  int64 consumer_tax_cents            = 4;   // withheld from gross store sales
  int64 land_tax_cents                = 5;   // land tax paid per owned building
  int64 supply_purchases_cents        = 6;   // paid to suppliers via supply links
  int64 marketing_spend_cents         = 7;   // active campaign budget deducted
  int64 research_spend_cents          = 8;   // research project budget deducted
  int64 loan_interest_cents           = 9;   // loan interest payments
  int64 transport_fees_cents          = 15;  // distance-based supply-chain transport fees (to gov treasury)
  int64 utility_cost_cents            = 16;  // electricity + water utility charges
  int64 upkeep_cents                  = 18;  // residential building maintenance costs
  int64 rental_tax_cents              = 19;  // income tax on rental income

  // Totals
  int64 total_revenue_cents           = 10;
  int64 total_expenses_cents          = 11;
  int64 net_profit_cents              = 12;

  // Balance snapshot
  int64 balance_before_tick           = 13;
  int64 balance_after_tick            = 14;
}

message GetCompanyHistoryResponse {
  repeated CompanyTickSnapshot snapshots = 1;
}

// ── Player Lookup ────────────────────────────────────────────────────────────

message FindPlayerByHandleRequest {
  string handle = 1; // username to search for (case-insensitive)
}

message FindPlayerByHandleResponse {
  bool   found     = 1;
  string player_id = 2; // empty when not found
  string username  = 3; // normalised username
  string city_id   = 4; // city the player lives in
}


// ─────────────────────────────────────────────────────────────────────────
// politics.proto
// ─────────────────────────────────────────────────────────────────────────
service PoliticsService {
  rpc GetGovernment  (GetGovernmentRequest)  returns (GovernmentInfo) {
    option (google.api.http) = { get: "/v1/cities/{city_id}/government" };
  }
  rpc GetElection    (GetElectionRequest)    returns (ElectionInfo) {
    option (google.api.http) = { get: "/v1/cities/{city_id}/election" };
  }
  rpc RunForElection (RunForElectionRequest) returns (RunForElectionResponse) {
    option (google.api.http) = { post: "/v1/elections/{election_id}/candidates" body: "*" };
  }
  rpc EnactPolicy    (EnactPolicyRequest)    returns (EnactPolicyResponse) {
    option (google.api.http) = { put: "/v1/cities/{city_id}/government/policy" body: "*" };
  }
  rpc CastVote       (CastVoteRequest)       returns (CastVoteResponse) {
    option (google.api.http) = { post: "/v1/elections/{election_id}/votes" body: "*" };
  }
}

message GetGovernmentRequest {
  string city_id = 1;
}

message GovernmentInfo {
  string ruling_player_id      = 1; // empty = AI
  string ruling_player_name    = 2;
  float  consumer_tax_rate     = 3;
  float  profit_tax_rate       = 4;
  float  land_tax_rate         = 5;
  float  employee_tax_rate     = 6;
  float  approval_city         = 7;
  float  approval_people       = 8;
  float  approval_business     = 9;
  int64  term_start_tick       = 10;
  int64  term_end_tick         = 11;
}

message GetElectionRequest {
  string city_id = 1;
}

message CandidateInfo {
  string player_id        = 1;
  string player_name      = 2;
  float  perception       = 3;
  int32  votes            = 4; // total votes (player + simulated citizens)
  int32  player_votes     = 5; // votes from real players
  int32  citizen_votes    = 6; // simulated citizen votes
  float  poll_percent     = 7; // current polling percentage (0–100)
}

message ElectionInfo {
  string         election_id      = 1;
  ElectionStatus status           = 2;
  int64          voting_start     = 3;
  int64          voting_end       = 4;
  string         winner_player_id = 5;
  int64          last_polled_tick = 6; // when polls were last recalculated
  bool           player_has_voted = 7; // whether the calling player has voted
  repeated CandidateInfo candidates = 8;
}

message RunForElectionRequest {
  string election_id = 1;
}

message RunForElectionResponse {
  bool   success = 1;
  string message = 2;
}

message EnactPolicyRequest {
  string city_id              = 1;
  float  consumer_tax_rate    = 2; // -1 = don't change
  float  profit_tax_rate      = 3;
  float  land_tax_rate        = 4;
  float  employee_tax_rate    = 5;
}

message EnactPolicyResponse {
  bool   success = 1;
  string message = 2;
}

message CastVoteRequest {
  string election_id  = 1;
  string candidate_id = 2;
}

message CastVoteResponse {
  bool   success = 1;
  string message = 2;
}


// ─────────────────────────────────────────────────────────────────────────
// research.proto
// ─────────────────────────────────────────────────────────────────────────
service ResearchService {
  rpc StartResearch (StartResearchRequest) returns (StartResearchResponse) {
  }
  rpc GetProgress   (GetResearchRequest)   returns (ResearchProgress) {
    option (google.api.http) = { get: "/v1/research/{resource_type}" };
  }
  rpc ListResearch  (ListResearchRequest)  returns (ListResearchResponse) {
  }
  rpc PauseResearch (PauseResearchRequest) returns (PauseResearchResponse) {
    option (google.api.http) = { put: "/v1/research/{project_id}/pause" body: "*" };
  }
}

message StartResearchRequest {
  ResourceType resource_type    = 1;
  int32        workers_assigned = 2;
  int64        budget_per_tick  = 3;
}

message StartResearchResponse {
  string project_id = 1;
}

message GetResearchRequest {
  ResourceType resource_type = 1;
}

message ResearchProgress {
  ResourceType resource_type   = 1;
  int32        level           = 2;
  float        progress        = 3; // 0–1 fraction (divide entity 0–100 by 100 before sending)
  bool         is_active       = 4;
  int64        budget_per_tick = 5;
  int32        workers         = 6;
  string       project_id      = 7;
}

message ListResearchRequest {}

message ListResearchResponse {
  repeated ResearchProgress projects = 1;
}

message PauseResearchRequest {
  string project_id = 1;
  bool   pause      = 2; // true = pause, false = resume
}

message PauseResearchResponse {
  bool success = 1;
}


// ─────────────────────────────────────────────────────────────────────────
// tile.proto
// ─────────────────────────────────────────────────────────────────────────
service TileService {
  rpc ListTiles       (ListTilesRequest)       returns (ListTilesResponse) {
    option (google.api.http) = { get: "/v1/cities/{city_id}/tiles" };
  }
  rpc GetTile         (GetTileRequest)         returns (TileInfo) {
    option (google.api.http) = { get: "/v1/tiles/{tile_id}" };
  }
  rpc PurchaseTile    (PurchaseTileRequest)    returns (PurchaseTileResponse) {
    option (google.api.http) = { post: "/v1/tiles/{tile_id}/purchase" body: "*" };
  }
}

// Viewport query — returns tiles whose GridX/Y is within the given bounds
message ListTilesRequest {
  string city_id = 1;
  int32  min_x   = 2;
  int32  min_y   = 3;
  int32  max_x   = 4;
  int32  max_y   = 5;
}

message TileInfo {
  string         tile_id                      = 1;
  string         city_id                      = 2;
  int32          grid_x                       = 3;
  int32          grid_y                       = 4;
  string         owner_player_id              = 5;  // empty = government
  string         owner_name                   = 6;
  bool           is_reserved_for_citizens     = 7;
  bool           is_for_sale                  = 8;
  int64          purchase_price               = 9;
  string         building_id                  = 10; // empty = no building
  string         building_name                = 11;
  BuildingType   building_type                = 12;
  BuildingStatus building_status              = 13;
  string         building_player_id           = 14; // player who owns the building
  string         building_player_name         = 15;
  int32          building_level               = 16;
  int64          construction_ready_at_tick   = 17; // tick when construction completes; 0 if already built
  int32          population_capacity          = 18; // residential buildings only
  bool           is_government_port           = 19;
  repeated string building_output_types       = 20; // resource types this building can produce (e.g. "RESOURCE_TYPE_GRAIN")
}

message ListTilesResponse {
  repeated TileInfo tiles  = 1;
  // City tile metadata so the client can compute lat/lon from grid coords
  double tile_origin_lat   = 2;
  double tile_origin_lon   = 3;
  int32  tile_grid_cols    = 4;
  int32  tile_grid_rows    = 5;
  int32  tile_size_meters  = 6;
}

message GetTileRequest    { string tile_id = 1; }

message PurchaseTileRequest  { string tile_id = 1; }
message PurchaseTileResponse { string tile_id = 1; int64 new_balance = 2; }

