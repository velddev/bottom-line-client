  }
  rpc BorrowCapital (BorrowCapitalRequest) returns (BorrowCapitalResponse) {
    option (google.api.http) = { post: "/v1/cities/{city_id}/bank/borrow" body: "*" };
  }
  rpc RepayDebt     (RepayDebtRequest)     returns (RepayDebtResponse) {
    option (google.api.http) = { post: "/v1/cities/{city_id}/bank/repay" body: "*" };
  }
}

message GetLoanRequest       { string city_id = 1; }
message GetLoanResponse      {
  int64  balance             = 1;
  double interest_rate       = 2;  // per tick
  int64  interest_per_tick   = 3;  // current interest charge per tick (cents)
  int64  max_borrow          = 4;  // maximum additional borrowing allowed (cents)
  int64  player_balance      = 5;  // player's current cash balance (cents)
}

message BorrowCapitalRequest  { string city_id = 1; int64 amount = 2; }
message BorrowCapitalResponse { int64 new_loan_balance = 1; int64 player_balance = 2; string message = 3; }

message RepayDebtRequest      { string city_id = 1; int64 amount = 2; }
message RepayDebtResponse     { int64 new_loan_balance = 1; int64 player_balance = 2; string message = 3; }


