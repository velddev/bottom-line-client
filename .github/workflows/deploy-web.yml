name: Deploy Web

on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger trade-mmo deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: velddev/trade-mmo
          event-type: deploy
