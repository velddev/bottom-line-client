message Timestamp { int64 seconds = 1; int32 nanos = 2; }


// ─────────────────────────────────────────────────────────────────────────
// common.proto
// ─────────────────────────────────────────────────────────────────────────
// Shared enum types used across all TradeMMO services.

// All tradeable resource types in the game.
// monetary values are cents (int64); quantities are doubles.
enum ResourceType {
  RESOURCE_TYPE_UNSPECIFIED = 0;
  RESOURCE_TYPE_WATER       = 1; // fresh water, consumed by fields and factories
  RESOURCE_TYPE_GRAIN       = 2; // grown on fields, used in animal feed and food production
  RESOURCE_TYPE_ANIMAL_FEED = 3; // produced from grain + water in a factory, consumed by cattle farms
  RESOURCE_TYPE_CATTLE      = 4; // raised on fields with animal feed, slaughtered in factories
  RESOURCE_TYPE_MEAT        = 5; // produced from cattle in a factory; sold to stores
  RESOURCE_TYPE_LEATHER     = 6; // by-product of meat production; sold to stores
  RESOURCE_TYPE_FOOD        = 7; // processed food produced in a factory; sold in stores to citizens
}

// Building types that players can construct.
enum BuildingType {
  BUILDING_TYPE_UNSPECIFIED = 0;
  BUILDING_TYPE_FIELD       = 1; // outdoor plot — grows grain or raises cattle
  BUILDING_TYPE_FACTORY     = 2; // processes raw resources into goods
  BUILDING_TYPE_STORE       = 3; // sells consumer goods directly to citizens
  BUILDING_TYPE_WAREHOUSE   = 4; // bulk storage, redistributes resources via supply links
  BUILDING_TYPE_LANDMARK    = 5; // government or special building
  BUILDING_TYPE_BANK        = 6; // provides loans to players
}

// Lifecycle state of a building.
enum BuildingStatus {
  BUILDING_STATUS_UNSPECIFIED        = 0;
  BUILDING_STATUS_UNDER_CONSTRUCTION = 1; // ticks_to_ready > 0
  BUILDING_STATUS_IDLE               = 2; // configured but not producing
  BUILDING_STATUS_PRODUCING          = 3; // actively producing this tick
  BUILDING_STATUS_PAUSED             = 4; // manually paused by the owner
  BUILDING_STATUS_MISSING_RESOURCES  = 5; // supply chain could not fill requirements
}

// Status of a trade agreement.
enum AgreementStatus {
  AGREEMENT_STATUS_UNSPECIFIED = 0;
  AGREEMENT_STATUS_PENDING     = 1; // awaiting buyer acceptance
  AGREEMENT_STATUS_ACTIVE      = 2; // accepted; terms in effect
  AGREEMENT_STATUS_REJECTED    = 3; // buyer rejected
  AGREEMENT_STATUS_CANCELLED   = 4; // creator or buyer cancelled
  AGREEMENT_STATUS_EXPIRED     = 5; // reached expires_at_tick without renewal
}

// Lifecycle phase of a city election.
enum ElectionStatus {
  ELECTION_STATUS_UNSPECIFIED = 0;
  ELECTION_STATUS_UPCOMING    = 1; // announced, not yet in campaign phase
  ELECTION_STATUS_CAMPAIGNING = 2; // candidates can register
  ELECTION_STATUS_VOTING      = 3; // citizens are voting
  ELECTION_STATUS_CONCLUDED   = 4; // winner determined
}


