message ConstructRequest {
  string       city_id       = 1;
  BuildingType building_type = 2;
  string       name          = 3;
  string       tile_id       = 4; // tile the building will be placed on
}

message ConstructResponse {
  string building_id                   = 1;
  int32  construction_ticks_remaining  = 2;
}

message ConfigureRequest {
  string building_id       = 1;
  string recipe_id         = 2;
  int32  workers_assigned  = 3;
}

message ConfigureResponse {
  bool success = 1;
}

message GetBuildingRequest {
  string building_id = 1;
}

// Full building detail (returned by GetStatus and listed in ListBuildings).
message BuildingInfo {
  string         building_id                  = 1;
  string         name                         = 2;
  BuildingType   building_type                = 3;
  BuildingStatus status                       = 4;
  string         active_recipe                = 5;
  int32          workers                      = 6;
  int32          level                        = 7;
  int32          ticks_to_ready               = 8;
  string         tile_id                      = 9;  // empty = not placed on a tile
  int32          tile_grid_x                  = 10;
  int32          tile_grid_y                  = 11;
  int32          construction_ticks_remaining = 12; // > 0 only when status = UNDER_CONSTRUCTION
  ResourceType   output_type                  = 13; // resource this building currently produces (unspecified if no recipe set)
  int32          population_capacity          = 14; // number of citizens housed (residential buildings only; 0 otherwise)

  // ── Landlord / Rent fields (residential only) ─────────────────────────
  int32          units                        = 15; // rentable units (1/4/20)
  int32          occupied_units               = 16; // units with tenants
  int64          rent_per_unit_cents          = 17; // monthly rent per unit in cents
  float          freshness                    = 18; // 0–100 building condition
  int64          construction_cost_cents      = 19; // cost to build in cents
  int64          for_sale_price_cents         = 20; // 0 = not listed for sale
  bool           is_renovating                = 21;
  int32          renovation_ticks_remaining   = 22;
  int64          built_at_tick                = 23;

  // ── Citizen class counts (residential only) ─────────────────────────
  int32          citizens_lower_bottom        = 24;
  int32          citizens_lower               = 25;
  int32          citizens_middle              = 26;
  int32          citizens_upper               = 27;
  int32          citizens_one_percent         = 28;
  int32          citizens_point_one_percent   = 29;
  int64          average_daily_spend_cents    = 30; // weighted avg daily spend of all tenants
  float          spending_modifier            = 31; // current spending modifier (1.0 = normal)
}

message ListBuildingsRequest {}

message ListBuildingsResponse {
  repeated BuildingInfo buildings = 1;
}

message RecipeInfo {
  string       recipe_id      = 1;
  string       name           = 2;
  BuildingType building_type  = 3;
  ResourceType output_type    = 4;
  double       output_min     = 5;
  double       output_max     = 6;
  int32        ticks_required = 7;
  repeated IngredientInfo ingredients = 8;
}

message IngredientInfo {
  ResourceType resource_type = 1;
  double       quantity      = 2;
}

message ListRecipesRequest {
