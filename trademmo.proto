// ─────────────────────────────────────────────────────────────────────────
// common.proto
// ─────────────────────────────────────────────────────────────────────────
// Shared enum types used across all TradeMMO services.

// All tradeable resource types in the game.
// monetary values are cents (int64); quantities are doubles.
enum ResourceType {
  RESOURCE_TYPE_UNSPECIFIED = 0;
  RESOURCE_TYPE_WATER       = 1; // fresh water, consumed by fields and factories
  RESOURCE_TYPE_GRAIN       = 2; // grown on fields, used in animal feed and food production
  RESOURCE_TYPE_ANIMAL_FEED = 3; // produced from grain + water in a factory, consumed by cattle farms
  RESOURCE_TYPE_CATTLE      = 4; // raised on fields with animal feed, slaughtered in factories
  RESOURCE_TYPE_MEAT        = 5; // produced from cattle in a factory; sold to stores
  RESOURCE_TYPE_LEATHER     = 6; // by-product of meat production; sold to stores
  RESOURCE_TYPE_FOOD        = 7; // processed food produced in a factory; sold in stores to citizens
}

// Building types that players can construct.
enum BuildingType {
  BUILDING_TYPE_UNSPECIFIED          = 0;
  BUILDING_TYPE_FIELD                = 1; // outdoor plot — grows grain or raises cattle
  BUILDING_TYPE_FACTORY              = 2; // processes raw resources into goods
  BUILDING_TYPE_STORE                = 3; // sells consumer goods directly to citizens
  BUILDING_TYPE_WAREHOUSE            = 4; // bulk storage, redistributes resources via supply links
  BUILDING_TYPE_LANDMARK             = 5; // government or special building
  BUILDING_TYPE_BANK                 = 6; // provides loans to players
  BUILDING_TYPE_RESIDENTIAL_LOW      = 7; // low-density housing, capacity 25, any tile
  BUILDING_TYPE_RESIDENTIAL_MEDIUM   = 8; // medium-density housing, capacity 100, market score >= 30
  BUILDING_TYPE_RESIDENTIAL_HIGH     = 9; // high-density housing, capacity 500, market score >= 70
}

// Lifecycle state of a building.
enum BuildingStatus {
  BUILDING_STATUS_UNSPECIFIED        = 0;
  BUILDING_STATUS_UNDER_CONSTRUCTION = 1; // ticks_to_ready > 0
  BUILDING_STATUS_IDLE               = 2; // configured but not producing
  BUILDING_STATUS_PRODUCING          = 3; // actively producing this tick
  BUILDING_STATUS_PAUSED             = 4; // manually paused by the owner
  BUILDING_STATUS_MISSING_RESOURCES  = 5; // supply chain could not fill requirements
}

// Status of a trade agreement.
enum AgreementStatus {
  AGREEMENT_STATUS_UNSPECIFIED = 0;
  AGREEMENT_STATUS_PENDING     = 1; // awaiting buyer acceptance
  AGREEMENT_STATUS_ACTIVE      = 2; // accepted; terms in effect
  AGREEMENT_STATUS_REJECTED    = 3; // buyer rejected
  AGREEMENT_STATUS_CANCELLED   = 4; // creator or buyer cancelled
  AGREEMENT_STATUS_EXPIRED     = 5; // reached expires_at_tick without renewal
}

// Lifecycle phase of a city election.
enum ElectionStatus {
  ELECTION_STATUS_UNSPECIFIED = 0;
  ELECTION_STATUS_UPCOMING    = 1; // announced, not yet in campaign phase
  ELECTION_STATUS_CAMPAIGNING = 2; // candidates can register
  ELECTION_STATUS_VOTING      = 3; // citizens are voting
  ELECTION_STATUS_CONCLUDED   = 4; // winner determined
}

// Identifies which government tax rate was changed in a GovernmentPolicyChangedEvent.
enum TaxType {
  TAX_TYPE_UNSPECIFIED = 0;
  CONSUMER_TAX = 1; // sales tax deducted from every citizen store purchase
  LAND_TAX     = 2; // per-building tax collected each tick
  PROFIT_TAX   = 3; // tax on player net profit (reserved for future use)
  EMPLOYEE_TAX = 4; // employee payroll tax (reserved for future use)
}

// Wealth class of citizens living in residential buildings.
enum CitizenClass {
  CITIZEN_CLASS_UNSPECIFIED      = 0;
  CITIZEN_CLASS_LOWER_BOTTOM    = 1; // poverty — $2/day
  CITIZEN_CLASS_LOWER           = 2; // working class — $5/day
  CITIZEN_CLASS_MIDDLE          = 3; // middle class — $15/day
  CITIZEN_CLASS_UPPER           = 4; // upper class — $40/day
  CITIZEN_CLASS_ONE_PERCENT     = 5; // wealthy — $150/day
  CITIZEN_CLASS_POINT_ONE_PERCENT = 6; // elite — $500/day
}


// ─────────────────────────────────────────────────────────────────────────
// agreement.proto
// ─────────────────────────────────────────────────────────────────────────
service TradeAgreementService {
  rpc Create  (CreateAgreementRequest)  returns (CreateAgreementResponse) {
  }
  rpc Respond (RespondAgreementRequest) returns (RespondAgreementResponse) {
    option (google.api.http) = { put: "/v1/agreements/{agreement_id}/response" body: "*" };
  }
  rpc List    (ListAgreementsRequest)   returns (ListAgreementsResponse) {
  }
  rpc Cancel  (CancelAgreementRequest)  returns (CancelAgreementResponse) {
    option (google.api.http) = { delete: "/v1/agreements/{agreement_id}" };
  }
}

enum AgreementResponse {
  AGREEMENT_RESPONSE_UNSPECIFIED = 0;
  AGREEMENT_RESPONSE_ACCEPT      = 1;
  AGREEMENT_RESPONSE_REJECT      = 2;
}

enum AgreementRole {
  AGREEMENT_ROLE_UNSPECIFIED = 0;
  AGREEMENT_ROLE_CREATOR     = 1; // filter: only agreements you created
  AGREEMENT_ROLE_BUYER       = 2; // filter: only agreements you are a buyer of
}

message CreateAgreementRequest {
  string          buyer_player_id         = 1;
  ResourceType    resource_type           = 2;
  float           discount_rate           = 3;
  bool            require_non_competition = 4;
  bool            require_msrp            = 5;
  int64           msrp_price              = 6;
  bool            disallow_white_labeling = 7;
  int64           expires_at_tick         = 8; // 0 = no expiry
}

message CreateAgreementResponse {
  string agreement_id = 1;
}

message RespondAgreementRequest {
  string            agreement_id = 1;
  AgreementResponse response     = 2;
}

message RespondAgreementResponse {
  bool success = 1;
}

message AgreementSummary {
  string          agreement_id            = 1;
  string          creator_player_id       = 2;
  string          buyer_player_id         = 3;
  ResourceType    resource_type           = 4;
  float           discount_rate           = 5;
  AgreementStatus status                  = 6;
  bool            require_non_competition = 7;
  bool            require_msrp            = 8;
  int64           msrp_price              = 9;
  bool            disallow_white_labeling = 10;
  int64           expires_at_tick         = 11;
}

message ListAgreementsRequest {
  AgreementRole role = 1; // 0 = both creator and buyer
}

message ListAgreementsResponse {
  repeated AgreementSummary agreements = 1;
}

message CancelAgreementRequest {
  string agreement_id = 1;
}

message CancelAgreementResponse {
  bool success = 1;
}


// ─────────────────────────────────────────────────────────────────────────
// auth.proto
// ─────────────────────────────────────────────────────────────────────────
enum OAuthProvider {
  OAUTH_PROVIDER_UNSPECIFIED = 0;
  DISCORD = 1;
  // future: GOOGLE = 2; APPLE = 3; STEAM = 4; etc.
}

service AuthService {
  // Returns all configured OAuth providers with their client_ids.
  rpc GetAuthMethods (GetAuthMethodsRequest) returns (GetAuthMethodsResponse) {
  }

  // Returns the OAuth2 client_id for the requested provider.
  rpc GetOAuthClientId (GetOAuthClientIdRequest) returns (GetOAuthClientIdResponse) {
    option (google.api.http) = { get: "/v1/auth/oauth/{provider}/client-id" };
  }

  // Client-side OAuth code exchange.
  rpc ExchangeOAuthCode (ExchangeOAuthCodeRequest) returns (ExchangeOAuthCodeResponse) {
  }
}

message GetAuthMethodsRequest {}

message AuthMethod {
  OAuthProvider provider  = 1;
  string        client_id = 2;
}

message GetAuthMethodsResponse {
  repeated AuthMethod methods = 1;
}

message GetOAuthClientIdRequest {
  OAuthProvider provider = 1;
}

message GetOAuthClientIdResponse {
  string client_id = 1;
}

message ExchangeOAuthCodeRequest {
  OAuthProvider provider    = 1;
  string        code        = 2;
  string        redirect_uri = 3;
  // Optional display name override for new accounts.
  // Ignored for existing accounts (returning users keep their existing username).
  string        display_name = 4;
}

message ExchangeOAuthCodeResponse {
  string player_id = 1;
  string api_key   = 2; // raw key — shown once, store it!
}


