  ResourceType resource_type = 2;
}
message ListPotentialSuppliersResponse { repeated PotentialSupplier suppliers = 1; }

message GetAutoSellConfigsRequest  { string building_id = 1; }
message GetAutoSellConfigsResponse { repeated AutoSellConfigInfo configs = 1; }
message AutoSellConfigInfo {
